<!DOCTYPE html>
<html lang="en" data-theme="teal" data-mode="dark" data-size="md" data-layout="normal" data-cb="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depth — Page not found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/reset.css">
<link rel="stylesheet" href="/assets/css/layout.css">
<style>
  .notfound{ max-width:640px; margin:120px auto; padding:0 24px; text-align:center; }
  .notfound h1{ font-size:2.5rem; margin-bottom:16px; }
  .notfound p{ color:var(--ink-muted); font-size:1rem; margin-bottom:32px; }
  .notfound a{ font-family:'IBM Plex Mono', monospace; font-size:0.875rem; color:var(--accent); text-decoration:none; border:1px solid var(--line); padding:12px 24px; border-radius:4px; }
</style>
</head>
<body>
<div class="notfound">
  <div class="eyebrow">404</div>
  <h1>Page not found</h1>
  <p>That page doesn't exist. Head back and pick a track.</p>
  <a href="/">← Back to Depth</a>
</div>
</body>
</html>
